name: PresenceHub-API

# `api` + `postgres` + `nginx` share the `backend` bridge (no static IPs). Laravel reads `.env` from the bind mount; set DB_HOST=postgres in `.env` when using this stack.
# Do not inject DB_* via Compose `env_file`/`environment` on `api`—that blocks `.env.testing` during `php artisan test` (Dotenv safeLoad).
# External HTTP(S) is served by `nginx` on ports 80/443; `api` listens on 8000 inside the network only.
# If you still see errors mentioning 172.28.x.x or `db`, remove old networks: `docker compose down` then prune
# unused networks in Docker Desktop, and ensure you are in this project directory when you run compose.

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    expose:
      - "8000"
    volumes:
      - .:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/ssl:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${DB_DATABASE:-presencehub-dev}"
      POSTGRES_USER: "${DB_USERNAME:-presencehub-dev}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Creates presencehub_testing on first volume init only. Existing volume: recreate volume or run CREATE DATABASE manually once.
      - ./docker/postgres/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
